<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px 20px;
            background-color: #0e0e0e;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        h1 {
            color: #fefefe;
            text-align: center;
            font-size: 1.5rem;
        }


        form {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        input, select, button {
            padding: 12px 16px;
            font-size: 1.2rem;
            border: none;
            background-color: antiquewhite;
            width: 100%;
        }

        button {
            background-color: aqua;
        }

        .output-wrapper {
            width: 100%;
            max-width: 800px;
            margin-top: 32px;
            background-color: #fefefe23;
            color: #fefefe;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px;
            font-size: 1.2rem;
            text-align: center;
        }

        .img-wrapper {
            width: 100%;
            max-width: 450px;
        }

        img {
            width: 100%;
        }

        .weight-output {
            background-color: #fefefe45;
            padding: 20px;
            max-width: 450px;
        }

        option {
            text-transform: uppercase;
        }


        @media screen and (min-width: 800px)  {

            body {
                padding: 60px 40px;
            }
            form {
                flex-direction: row;
                justify-content: center;
                max-width: 800px;
            }

            input, select, button {
                width: 32%;
            }

            h1 {
                font-size: 2rem;
            }

            .output-wrapper {
                flex-direction: row;
                gap: 2%;
                max-width: 800px;
            }

            .img-wrapper {
                max-width: unset;
                width: 48%;
            }

            .weight-output {
                max-width: unset;
                width: 48%;
            }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Calculate the weight of an object on a planet</h1>
    <form action="">
        <input placeholder="Mass in KG" class="mass-input" type="text">
    <select placeholder="Select">
        <option value="mercury">mercury</option>
        <option value="venus">venus</option>
        <option value="earth">earth</option>
        <option value="mars">mars</option>
        <option value="jupiter">jupiter</option>
        <option value="saturn">saturn</option>
        <option value="uranus">uranus</option>
        <option value="neptune">neptune</option>
        <option value="pluto">pluto</option>
    </select>
    <button>Calculate Weight</button>
    </form>
    <div class="output-wrapper">
        <div class="img-wrapper">
            <img src="" alt="">
        </div>
        <div class="weight-output hidden">
            <h3 class="weight-statement hidden">The weight of the object in <span id="planet"></span></h3>
            <p class="result"></p>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
    <!-- <script src="/others/countries_data.js"></script> -->
</body>
</html>
