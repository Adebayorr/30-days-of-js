<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
       <main>
            <h1 class="heading-one">30 Days of JavaScript Challenge Leaderboard</h1>
            <form action="" >
                <input id="first-name" type="text" placeholder="First Name" autocomplete="on">
                <input id="last-name" type="text" placeholder="Last Name" autocomplete="on">
                <input id="country" type="text" placeholder="Country" autocomplete="on">
                <input id="score" type="number" placeholder="Score">
                <button>Add Player</button>
            </form>
            <div class="leaderboard-wrapper">
                
            </div>
       </main>
</body>
</html>
