<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 29</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 100vh;
            padding: 20px;
        }
        .text {
            font-size: 6.5rem;
            font-weight: bold;
            text-transform: uppercase;
            animation: fadeOut 2s ease-out;
        }


        @keyframes fadeOut {
            0% {
                 opacity: 0.2;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container"></div>
    <script src="script.js"></script>
</body>
</html>
