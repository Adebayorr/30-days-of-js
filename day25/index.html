<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>\
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;

        }

        body {
            margin: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-items: center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            color: #F2A93B;
        }

        .title-wrapper, .filter-btn-wrapper {
            text-align: center;
        }

        .title-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .title {
            font-size: 1.5rem;
        }
        .subtitle {
            color: #0e0e0e;
        }

        button {
            background-color: #F2A93B;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 5%;
        }

        .text {
            text-align: center;
            margin-top: 8px;
        }

        


        @media screen and (min-width: 600px) {
            .data-visual-div {
            display: flex;
            width: 100%;
            max-width: 800px;
        }

        .visual-one {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter, .detail {
            width: 15%;
        }

        .detail {
            text-align: start;
        }

        .bar-wrapper {
            width: 68%;
            background-color: #F2A93B11;
            height: 40px;
        }

        .bar {
            background-color: #F2A93B;
            display: block;
            width: 80%;
            height: 100%;
        }
        }
    </style>
</head>
<body>
    
    <div class="title-wrapper">
        <h1 class="title">World Countries Data</h1>
        <p class="subtitle">Currently, we have <span class="countries-count"></span> countries</p>
    </div>
    <div class="fiter-btn-wrapper">
        <button class="pop-filter-btn">Population</button>
        <button class="lang-filter-btn">Languages</button>
        <p class="text">10 Most<span class="filter-desc"></span> in the world</p>
    </div>
    <div class="data-visual-div">
        <div class="visual-one">
            <p class="filter">English</p>
            <div class="bar-wrapper">
                <span class="bar"></span>
            </div>
            <p class="detail">92</p>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
