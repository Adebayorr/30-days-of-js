<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css"></link>
</head>
<body>
    <div class="input-container">
        <h1 class="title">World Countries List</h1>
        <strong>Total Numbers of Countries <span id="countries-count"></span></strong>
        <p class="comment">Countries that starts with <span id="filter-param"></span> are <span id="filtered-count"></span></p>
        <div class="button-wrappers">
            <button class="">Starting Word</button>
            <button class="">Search With Any Word</button>
            <button class="">Ascending</button>
        </div>
        <div class="search-bar_wrapper">
            <input type="search">
            <button class="search-btn">Search</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
